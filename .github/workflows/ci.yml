name: CI

#pipeline triggered on push to any branch or pull request to main branch
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

#we define a single job called "lint-and-test" that runs on the latest macOS environment. 
#the job consists of several steps, including checking out the code, setting up Python, installing dependencies, running a linter, performing a static application security testing (SAST) scan, checking for known vulnerabilities in dependencies, and running tests.
jobs:
  lint-and-test:
    runs-on: macos-latest

    steps:
        #github spins up a fresh empty mac machine (vm)
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest bandit safety

      - name: Run linter
        run: flake8 src/ tests/

      - name: Run SAST scan
        run: bandit -r src/ -ll

      - name: Check dependencies for known vulnerabilities
        run: safety check -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v